name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.2)"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag exists
        run: |
          TAG="${{ inputs.tag }}"
          if ! git rev-parse "${TAG}^{commit}" >/dev/null 2>&1; then
            echo "Tag ${TAG} not found on this ref"
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          generate_release_notes: true

      - name: Bump homebrew tap formula
        env:
          HOMEBREW_TAP_BUMP_TOKEN: ${{ secrets.HOMEBREW_TAP_BUMP_TOKEN }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_BUMP_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          if [ -z "${HOMEBREW_TAP_BUMP_TOKEN}" ]; then
            echo "::warning::HOMEBREW_TAP_BUMP_TOKEN not set — bump slagyr/homebrew-tap manually:"
            echo "  ./scripts/bump-isaac-formula.sh ${TAG}"
            exit 0
          fi
          gh api repos/slagyr/homebrew-tap/dispatches \
            -f event_type=foundation-release \
            -f "client_payload[tag]=${TAG}"